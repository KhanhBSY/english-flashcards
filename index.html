<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Flashcards</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EB; --surface: #FDFCF8; --ink: #1A1814; --ink-2: #5A5650; --ink-3: #9A958E;
    --accent: #2D5A3D; --accent-light: #EAF3DE; --border: rgba(26,24,20,0.12);
    --shadow: 0 2px 24px rgba(26,24,20,0.10), 0 1px 4px rgba(26,24,20,0.08); --dur: 0.55s;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1814; --surface: #232019; --ink: #F0EDE4; --ink-2: #AAA59C; --ink-3: #6A655E;
      --accent: #7EC898; --accent-light: #173404; --border: rgba(240,237,228,0.10);
      --shadow: 0 2px 24px rgba(0,0,0,0.40);
    }
  }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem 3rem; user-select: none; transition: background 0.4s;
  }
  body.driving { background: #0D1F3C; }
  @media (prefers-color-scheme: dark) { body.driving { background: #0A1628; } }

  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 600; letter-spacing: -0.02em; }
  header p { font-size: 0.85rem; color: var(--ink-3); margin-top: 0.35rem; }
  body.driving header h1 { color: #E8F0FB; }
  body.driving header p  { color: #7A9CC8; }

  .progress-wrap { width: min(520px,100%); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s; }
  body.driving .progress-fill { background: #5B9BD5; }
  .progress-label { font-size: 0.8rem; color: var(--ink-3); white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* countdown bar */
  .countdown-wrap { width: min(520px,100%); margin-bottom: 0.6rem; display: none; align-items: center; gap: 10px; }
  .countdown-wrap.visible { display: flex; }
  .countdown-label { font-size: 0.75rem; color: #7A9CC8; white-space: nowrap; }
  .countdown-bar { flex: 1; height: 4px; background: rgba(91,155,213,0.2); border-radius: 99px; overflow: hidden; }
  .countdown-fill { height: 100%; background: #5B9BD5; border-radius: 99px; width: 100%; }

  /* card */
  .scene { width: min(520px,100%); height: 340px; perspective: 1000px; cursor: pointer; margin-bottom: 1.5rem; touch-action: none; }
  .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform var(--dur) cubic-bezier(0.4,0,0.2,1); }
  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: var(--surface); border-radius: 20px; border: 1px solid var(--border);
    box-shadow: var(--shadow); padding: 2.5rem 2.25rem; display: flex; flex-direction: column;
    transition: background 0.4s, border-color 0.4s;
  }
  body.driving .face { background: #152340; border-color: rgba(91,155,213,0.2); }
  .face-front { justify-content: center; align-items: center; text-align: center; }
  .face-back  { transform: rotateY(180deg); justify-content: space-between; }

  .face-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 0.85rem; }
  body.driving .face-label { color: #4A7FAA; }

  .meaning-text { font-family: 'Lora', serif; font-size: 1.35rem; line-height: 1.55; color: var(--ink); }
  body.driving .meaning-text { color: #C8DEFA; }

  .swipe-hint { margin-top: 1.5rem; font-size: 0.75rem; color: var(--ink-3); display: flex; align-items: center; justify-content: center; gap: 6px; }
  .swipe-hint span { opacity: 0.5; }
  body.driving .swipe-hint { color: #4A7FAA; }

  .word-row { display: flex; align-items: center; gap: 10px; }
  .back-word { font-family: 'Lora', serif; font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; color: var(--ink); line-height: 1.2; }
  body.driving .back-word { color: #E8F4FF; }

  .back-pos { display: inline-block; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: var(--accent-light); padding: 2px 8px; border-radius: 4px; margin-top: 6px; }
  body.driving .back-pos { color: #5B9BD5; background: rgba(91,155,213,0.12); }

  .back-example { font-family: 'Lora', serif; font-style: italic; font-size: 0.95rem; line-height: 1.65; color: var(--ink-2); border-left: 2px solid var(--accent); padding-left: 1rem; margin-top: auto; }
  body.driving .back-example { color: #8EB8E8; border-left-color: #3A6FA0; }

  .example-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
  .back-example-label { font-family: 'DM Sans', sans-serif; font-style: normal; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }
  body.driving .back-example-label { color: #4A7FAA; }

  .speak-btn {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent; padding: 0;
  }
  .speak-btn:hover { background: var(--accent-light); border-color: var(--accent); }
  .speak-btn:active { transform: scale(0.9); }
  .speak-btn.speaking { background: var(--accent-light); border-color: var(--accent); animation: pulse-ring 0.6s ease infinite; }
  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 0 0 rgba(45,90,61,0.3); }
    50%      { box-shadow: 0 0 0 4px rgba(45,90,61,0.15); }
  }

  .controls { display: flex; align-items: center; gap: 12px; width: min(520px,100%); }
  .btn {
    height: 42px; padding: 0 1.25rem; border: 1px solid var(--border); background: var(--surface);
    color: var(--ink); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-flip { flex: 1; background: var(--accent); border-color: var(--accent); color: white; }
  .btn-flip:hover:not(:disabled) { opacity: 0.88; background: var(--accent); color: white; }
  .row-btns { display: flex; gap: 10px; width: min(520px,100%); margin-top: 0.85rem; }
  .btn-sm { height: 36px; font-size: 0.75rem; padding: 0 0.85rem; border-radius: 8px; flex: 1; }
  .btn-drive { background: #1A4A8A; border-color: #1A4A8A; color: white; }
  .btn-drive:hover { opacity: 0.88; background: #1A4A8A; color: white; }
  body.driving .btn-drive { background: #C0392B; border-color: #C0392B; }
  body.driving .btn:not(.btn-drive) { background: rgba(255,255,255,0.05); border-color: rgba(91,155,213,0.2); color: #5B9BD5; }
  body.driving .btn-flip { background: rgba(91,155,213,0.15); border-color: rgba(91,155,213,0.3); color: #8EB8E8; }

  .keyboard-hint { text-align: center; font-size: 0.72rem; color: var(--ink-3); margin-top: 1rem; }
  body.driving .keyboard-hint { color: #3A5A7A; }
  kbd { display: inline-block; padding: 1px 5px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.65rem; color: var(--ink-3); }

  .status { text-align: center; padding: 3rem 1rem; color: var(--ink-2); font-size: 0.9rem; line-height: 1.9; width: min(480px,100%); }
  .status.error { color: #A32D2D; }
  .dot-pulse { display: inline-flex; gap: 5px; margin-top: 0.75rem; }
  .dot-pulse span { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); animation: dp 1.2s infinite ease-in-out; }
  .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dp { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: #1A4A8A; color: white; padding: 0.6rem 1.25rem;
    border-radius: 99px; font-size: 0.82rem; font-weight: 500;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 99;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>🗂️ English Flashcards</h1>
  <p id="subtitle">Loading Vocab sheet…</p>
</header>
<div id="app">
  <div class="status">Fetching your vocabulary…<div class="dot-pulse"><span></span><span></span><span></span></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPzLzjhM4w4SaXPEAzRcFEXUgirKWsT8XNY4ju33WPqZg-vuZoi1Kpj2TCCSDdqoA6oTPkknLvjKle/pub?gid=271629694&single=true&output=csv';

let cards=[], current=0, flipped=false, colKeys=null;
let drivingMode=false, driveTimer=null, cdInterval=null, cdStart=0, cdDuration=0;
let drivePhaseToken=0;
const WAIT_MS=5000, REVEAL_MS=10000;

/* ══ Toast ══ */
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ══ Countdown bar ══ */
function startCountdown(ms, label) {
  const wrap=document.getElementById('cdWrap');
  const fill=document.getElementById('cdFill');
  const lbl=document.getElementById('cdLabel');
  if (!wrap||!fill) return;
  wrap.classList.add('visible');
  if (lbl) lbl.textContent=label;
  cdStart=Date.now(); cdDuration=ms;
  fill.style.width='100%';
  clearInterval(cdInterval);
  cdInterval=setInterval(()=>{
    const pct=Math.max(0, 100-((Date.now()-cdStart)/cdDuration)*100);
    fill.style.width=pct+'%';
    if (pct<=0) clearInterval(cdInterval);
  }, 50);
}

function stopCountdown() {
  clearInterval(cdInterval);
  const wrap=document.getElementById('cdWrap');
  if (wrap) wrap.classList.remove('visible');
}

/* ══ Speech ══ */
function speak(text, btnId) {
  if (!window.speechSynthesis) return Promise.resolve();
  window.speechSynthesis.cancel();
  return new Promise(resolve => {
    const btn=btnId?document.getElementById(btnId):null;
    if (btn) btn.classList.add('speaking');
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9;
    let done=false;
    const finish=()=>{
      if(done)return; done=true;
      clearTimeout(fallback);
      if(btn)btn.classList.remove('speaking');
      resolve();
    };
    u.onend=u.onerror=finish;
    /* fallback: resolve after estimated duration in case onend never fires (Chrome bug) */
    const fallback=setTimeout(finish, Math.max(5000, text.length*80+2000));
    window.speechSynthesis.speak(u);
  });
}

function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

/* ══ Driving mode ══ */
function startDriving() {
  drivingMode=true;
  document.body.classList.add('driving');
  showToast('🚗 Driving mode on');
  /* always start from meaning side */
  if (flipped) {
    flipped=false;
    render();
  }
  /* kick off phase 1 after a short grace period */
  clearTimeout(driveTimer);
  driveTimer=setTimeout(()=>drivePhase1(), 600);
}

function stopDriving() {
  drivingMode=false;
  document.body.classList.remove('driving');
  clearTimeout(driveTimer);
  stopCountdown();
  window.speechSynthesis&&window.speechSynthesis.cancel();
  showToast('Driving mode off');
  render();
}

/* Phase 1: meaning visible → wait 5s → flip to word */
function drivePhase1() {
  if (!drivingMode) return;
  startCountdown(WAIT_MS, 'Revealing word in…');
  driveTimer=setTimeout(()=>{
    if (!drivingMode) return;
    /* Flip the card visually */
    flipped=true;
    const c=document.getElementById('card');
    const b=document.getElementById('flipBtn');
    if (c) c.classList.add('flipped');
    if (b) b.textContent='Show meaning';
    /* Start phase 2 */
    drivePhase2();
  }, WAIT_MS);
}

/* Phase 2: word visible → speak → wait remaining time → next card */
async function drivePhase2() {
  if (!drivingMode) return;
  const myToken=++drivePhaseToken;
  const phaseStart=Date.now();
  startCountdown(REVEAL_MS, 'Next card in…');

  /* speak word then example */
  const card=cards[current];
  if (card) {
    const k=detectKeys(card);
    const word=card[k.word]||'';
    const example=card[k.example]||'';
    await speak(word, 'speakWord');
  }

  if (!drivingMode||drivePhaseToken!==myToken) return;

  /* wait out whatever remains of REVEAL_MS */
  const elapsed=Date.now()-phaseStart;
  const remaining=Math.max(0, REVEAL_MS-elapsed);
  driveTimer=setTimeout(()=>{
    if (!drivingMode||drivePhaseToken!==myToken) return;
    if (current>=cards.length-1) {
      stopDriving();
      showToast('🎉 All cards done!');
      return;
    }
    /* slide to next card then kick phase 1 */
    driveGoNext();
  }, remaining);
}

function driveGoNext() {
  if (!drivingMode) return;
  const next=current+1;
  if (next>=cards.length) { stopDriving(); showToast('🎉 All cards done!'); return; }

  window.speechSynthesis&&window.speechSynthesis.cancel();
  const cardEl=document.getElementById('card');
  const OUT_PX=window.innerWidth<600?340:560;

  if (cardEl) {
    cardEl.style.transition='transform 0.25s cubic-bezier(0.4,0,1,1)';
    cardEl.style.transform=`translateX(${-OUT_PX}px)`;
  }

  setTimeout(()=>{
    current=next; flipped=false; render();
    const newCard=document.getElementById('card');
    if (!newCard) return;
    newCard.style.transition='none';
    newCard.style.transform=`translateX(${OUT_PX}px)`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      newCard.style.transition='transform 0.28s cubic-bezier(0,0,0.2,1)';
      newCard.style.transform='translateX(0px)';
      /* clear inline styles after slide so CSS flip class works */
      setTimeout(()=>{ newCard.style.transform=''; newCard.style.transition=''; }, 300);
      /* start phase 1 after slide completes */
      driveTimer=setTimeout(()=>drivePhase1(), 350);
    }));
  }, 220);
}

/* ══ CSV parser ══ */
function parseCSV(text) {
  const lines=text.trim().split(/\r?\n/);
  const parseRow=row=>{
    const out=[]; let cur='', inQ=false;
    for (let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'&&!inQ){inQ=true;continue;}
      if(c==='"'&&inQ){if(row[i+1]==='"'){cur+='"';i++;}else inQ=false;continue;}
      if(c===','&&!inQ){out.push(cur.trim());cur='';continue;}
      cur+=c;
    }
    out.push(cur.trim()); return out;
  };
  const headers=parseRow(lines[0]).map(h=>h.toLowerCase().trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseRow(l),obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]!==undefined?vals[i].trim():'');
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

/* ══ Column detection ══ */
function findCol(hs,aliases){for(const a of aliases){const h=hs.find(k=>k.includes(a));if(h!==undefined)return h;}return '';}
function detectKeys(sample){
  if(colKeys)return colKeys;
  const hs=Object.keys(sample);
  colKeys={
    word:   findCol(hs,['word','term','vocab','english','英語','expression'])||hs[0]||'',
    meaning:findCol(hs,['meaning','definition','japanese','日本語','訳','gloss','desc','translation'])||hs[1]||'',
    example:findCol(hs,['example','sentence','usage','ex']),
    pos:    findCol(hs,['pos','part','type','品詞','class']),
  };
  return colKeys;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ══ Manual flip ══ */
function doFlip(){
  flipped=!flipped;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const c=document.getElementById('card'),b=document.getElementById('flipBtn');
  if(c)c.classList.toggle('flipped',flipped);
  if(b)b.textContent=flipped?'Show meaning':'Reveal word';

  if(drivingMode){
    drivePhaseToken++;
    clearTimeout(driveTimer);
    stopCountdown();
    if(flipped){
      /* user revealed the word — speak it then start "next card" countdown */
      drivePhase2();
    } else {
      /* user flipped back to meaning — restart "reveal word" countdown */
      drivePhase1();
    }
  }
}

/* ══ Manual navigate ══ */
function go(d){
  const next=current+d;
  if(next<0||next>=cards.length)return;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  if(drivingMode){ drivePhaseToken++; clearTimeout(driveTimer); stopCountdown(); }
  const cardEl=document.getElementById('card');
  if(!cardEl)return;
  const OUT_PX=window.innerWidth<600?340:560;
  const outX=d>0?-OUT_PX:OUT_PX, inX=d>0?OUT_PX:-OUT_PX;
  cardEl.style.transition=`transform 0.25s cubic-bezier(0.4,0,1,1)`;
  cardEl.style.transform=`translateX(${outX}px)`;
  setTimeout(()=>{
    current=next;flipped=false;render();
    const nc=document.getElementById('card');if(!nc)return;
    nc.style.transition='none';nc.style.transform=`translateX(${inX}px)`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      nc.style.transition='transform 0.28s cubic-bezier(0,0,0.2,1)';
      nc.style.transform='translateX(0px)';
      /* clear inline styles after slide so CSS flip class works */
      setTimeout(()=>{ nc.style.transform=''; nc.style.transition=''; }, 300);
      /* in drive mode, restart phase 1 for the new card */
      if(drivingMode) driveTimer=setTimeout(()=>drivePhase1(), 350);
    }));
  },220);
}

/* ══ Swipe — passive:false so we can preventDefault on horizontal ══ */
function attachSwipe(el) {
  let startX=0, startY=0, dragging=false, moved=false, isHoriz=false;
  const THRESHOLD=60, MAX_DRAG=120;

  el.addEventListener('touchstart', e=>{
    startX=e.touches[0].clientX; startY=e.touches[0].clientY;
    dragging=true; moved=false; isHoriz=false;
    const card=document.getElementById('card');
    if(card) card.style.transition='none';
  }, {passive:true});

  el.addEventListener('touchmove', e=>{
    if(!dragging)return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;

    if(!moved){
      /* determine direction on first significant movement */
      if(Math.abs(dx)<4&&Math.abs(dy)<4) return;
      isHoriz=Math.abs(dx)>Math.abs(dy);
      moved=true;
    }

    if(!isHoriz){
      /* vertical — let browser scroll, clear inline styles so CSS handles state */
      dragging=false;
      const card=document.getElementById('card');
      if(card){card.style.transition='';card.style.transform='';}
      return;
    }

    /* horizontal — prevent page scroll */
    e.preventDefault();

    const clamped=Math.sign(dx)*Math.min(Math.abs(dx),MAX_DRAG);
    const card=document.getElementById('card');
    if(card) card.style.transform=`translateX(${clamped}px)${flipped?' rotateY(180deg)':''}`;
  }, {passive:false});   /* <-- passive:false so preventDefault works */

  const onEnd=e=>{
    if(!dragging)return; dragging=false;
    const card=document.getElementById('card');
    if(!isHoriz){
      /* tap — clear inline styles so CSS .flipped class controls the flip */
      if(card){card.style.transition='';card.style.transform='';}
      return;
    }
    const dx=(e.changedTouches?e.changedTouches[0].clientX:e.clientX)-startX;
    if(Math.abs(dx)<THRESHOLD){
      if(card){card.style.transition='transform 0.2s cubic-bezier(0.4,0,0.2,1)';card.style.transform=flipped?'translateX(0px) rotateY(180deg)':'translateX(0px)';}
      return;
    }
    if(dx>0) go(-1); else go(1);
  };
  el.addEventListener('touchend',   onEnd,{passive:true});
  el.addEventListener('touchcancel',onEnd,{passive:true});
}

/* ══ Keyboard ══ */
document.addEventListener('keydown',e=>{
  if(!cards.length||drivingMode)return;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();doFlip();}
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft') go(-1);
});

/* ══ Render ══ */
function render(){
  const card=cards[current],k=detectKeys(card);
  const word=card[k.word]||'',meaning=card[k.meaning]||'',example=card[k.example]||'',pos=card[k.pos]||'';
  const pct=((current+1)/cards.length*100).toFixed(1);
  const hasSpeech=!!window.speechSynthesis;

  document.getElementById('app').innerHTML=`
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${current+1} / ${cards.length}</span>
    </div>

    <div class="countdown-wrap" id="cdWrap">
      <span class="countdown-label" id="cdLabel">Next card in…</span>
      <div class="countdown-bar"><div class="countdown-fill" id="cdFill"></div></div>
    </div>

    <div class="scene" id="scene">
      <div class="card${flipped?' flipped':''}" id="card">
        <div class="face face-front">
          <div class="face-label">meaning</div>
          <p class="meaning-text">${meaning?esc(meaning):'<em style="opacity:0.35">—</em>'}</p>
          <div class="swipe-hint" style="margin-top:1rem;"><span>←</span> swipe to navigate <span>→</span></div>
        </div>
        <div class="face face-back">
          <div>
            <div class="face-label">word</div>
            <div class="word-row">
              <div class="back-word">${esc(word)}</div>
              ${hasSpeech&&word?`<button class="speak-btn" id="speakWord" title="Pronounce word">🔊</button>`:''}
            </div>
            ${pos?`<span class="back-pos">${esc(pos)}</span>`:''}
          </div>
          ${example?`
          <div class="back-example">
            <div class="example-header">
              <span class="back-example-label">example</span>
              ${hasSpeech?`<button class="speak-btn" id="speakExample" title="Pronounce example">🔊</button>`:''}
            </div>
            ${esc(example)}
          </div>`:''}
        </div>
      </div>
    </div>

    <div class="row-btns">
      <button class="btn btn-sm btn-drive" id="driveBtn">${drivingMode?'⏹ Stop driving':'🚗 Driving mode'}</button>
      <button class="btn btn-sm" id="reshuffleBtn" ${drivingMode?'disabled':''}>⇄ Reshuffle</button>
      <button class="btn btn-sm" id="reloadBtn"    ${drivingMode?'disabled':''}>↺ Sync</button>
    </div>
    <p class="keyboard-hint"><kbd>Space</kbd> flip &nbsp;&nbsp; <kbd>←</kbd><kbd>→</kbd> navigate</p>
  `;

  /* speak buttons — stop touch events from bubbling to scene (prevents card flip) */
  function attachSpeakBtn(id, text) {
    const btn=document.getElementById(id); if(!btn) return;
    btn.addEventListener('click',      e=>{e.stopPropagation(); speak(text, id);});
    btn.addEventListener('touchstart', e=>{e.stopPropagation();}, {passive:true});
    btn.addEventListener('touchend',   e=>{e.stopPropagation();}, {passive:true});
  }
  attachSpeakBtn('speakWordFront', word);
  attachSpeakBtn('speakWord',      word);
  attachSpeakBtn('speakExample',   example);

document.getElementById('reshuffleBtn').addEventListener('click',()=>{if(drivingMode)return;cards=shuffle(cards);current=0;flipped=false;render();});
  document.getElementById('reloadBtn').addEventListener('click',  ()=>{if(drivingMode)return;cards=[];colKeys=null;init();});
  document.getElementById('driveBtn').addEventListener('click',   e=>{e.stopPropagation();drivingMode?stopDriving():startDriving();});

  /* tap-to-flip (not after a swipe) */
  const scene=document.getElementById('scene');
  let tapOk=true, lastTouchFlip=0;
  scene.addEventListener('touchstart',()=>{tapOk=true;},{passive:true});
  scene.addEventListener('touchmove', ()=>{tapOk=false;},{passive:true});
  scene.addEventListener('touchend',  ()=>{if(tapOk){lastTouchFlip=Date.now();doFlip();}},{passive:true});
  /* ignore the synthetic click that fires ~300ms after touchend on mobile */
  scene.addEventListener('click',     ()=>{if(Date.now()-lastTouchFlip>300)doFlip();});

  attachSwipe(scene);
}

/* ══ Boot ══ */
async function init(){
  document.getElementById('app').innerHTML=`<div class="status">Fetching your vocabulary…<div class="dot-pulse"><span></span><span></span><span></span></div></div>`;
  document.getElementById('subtitle').textContent='Loading Vocab sheet…';
  try{
    const res=await fetch(CSV_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    const raw=parseCSV(text);
    if(!raw.length) throw new Error('Sheet loaded but no rows found.');
    cards=shuffle(raw); colKeys=null;
    document.getElementById('subtitle').textContent=`${cards.length} cards · shuffled ✓`;
    render();
  }catch(err){
    document.getElementById('subtitle').textContent='Could not load';
    document.getElementById('app').innerHTML=`
      <div class="status error">
        <strong>Could not load the sheet.</strong><br>${esc(err.message)}<br><br>
        <small>Open via <strong>http://</strong> not file:// · Make sure the sheet is published</small><br><br>
        <button class="btn" onclick="init()" style="margin:0 auto">↺ Try again</button>
      </div>`;
  }
}

init();
</script>
</body>
</html>
